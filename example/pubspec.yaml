name: webview_plus_example
description: "Demonstrates how to use the webview_plus plugin."
publish_to: 'none'

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  webview_plus:
    path: ../

  path_provider: ^2.1.6

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/index.html
    - assets/image.jpg